<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NightFly">
  <meta name="theme-color" content="#080810">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>NightFly</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080810;
      color: #E8E8F0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,212,255,0.15);
      border-top-color: #00D4FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #installBtn {
      display: none;
      width: 100%;
      max-width: 320px;
      padding: 16px;
      background: #00D4FF;
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      -webkit-tap-highlight-color: transparent;
    }
    #installBtn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div style="font-size:52px">📻</div>
  <div style="font-size:24px;font-weight:800;letter-spacing:-.3px">NightFly</div>
  <div id="status" style="font-size:13px;opacity:.45;text-align:center">Connessione in corso…</div>
  <div class="spinner" id="spinner"></div>
  <button id="installBtn">📲 Aggiungi alla Home</button>

  <script>
    const PROD_URL = 'http://frankpis.duckdns.org:8765';
    const autoA2HS = new URLSearchParams(location.search).get('a2hs') === '1';
    let deferred   = null;
    let redirectTmr = null;

    function goToProd() {
      clearTimeout(redirectTmr);
      window.location.replace(PROD_URL);
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferred = e;
      clearTimeout(redirectTmr);

      if (autoA2HS) {
        // Mostra il bottone: il tap è il gesto diretto che permette prompt()
        document.getElementById('status').textContent = 'Tocca il bottone per aggiungere NightFly alla Home';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('installBtn').style.display = 'block';
      } else {
        goToProd();
      }
    });

    document.getElementById('installBtn').addEventListener('click', () => {
      const evt = deferred;
      deferred = null;
      if (!evt) { goToProd(); return; }
      document.getElementById('installBtn').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('status').textContent = 'Installazione…';
      evt.prompt();
      evt.userChoice.then(() => goToProd()).catch(() => goToProd());
    });

    window.addEventListener('appinstalled', goToProd);

    if (!autoA2HS) {
      goToProd();
    } else {
      // Aspetta beforeinstallprompt fino a 5 secondi, poi redirect comunque
      redirectTmr = setTimeout(goToProd, 5000);
    }
  </script>
</body>
</html>
