<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NightFly">
  <meta name="theme-color" content="#080810">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>NightFly</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080810;
      color: #E8E8F0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 18px;
      padding: 32px 24px;
      text-align: center;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(0,212,255,0.15);
      border-top-color: #00D4FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #installBtn {
      display: none;
      width: 100%;
      max-width: 320px;
      padding: 17px;
      background: #00D4FF;
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #installBtn:active { opacity: 0.82; }
  </style>
</head>
<body>
  <div style="font-size:56px">📻</div>
  <div style="font-size:24px;font-weight:800;letter-spacing:-.3px">NightFly</div>
  <div id="status" style="font-size:14px;opacity:.5;line-height:1.5">Preparazione…</div>
  <div class="spinner" id="spinner"></div>
  <button id="installBtn">📲 Aggiungi alla Home</button>

  <script>
    const PROD_URL = 'https://frankpis.duckdns.org:8765';
    const autoA2HS = new URLSearchParams(location.search).get('a2hs') === '1';
    let deferred   = null;
    let redirectTmr = null;

    // ── Service Worker ──────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ── Helpers ─────────────────────────────────────────────────────────────
    function setStatus(txt) {
      document.getElementById('status').textContent = txt;
    }
    function goToProd(delay) {
      clearTimeout(redirectTmr);
      setTimeout(() => window.location.replace(PROD_URL), delay || 0);
    }
    function showInstallBtn() {
      setStatus('Tocca il pulsante per fissare NightFly nella Home');
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('installBtn').style.display = 'block';
    }

    // ── PWA install events ───────────────────────────────────────────────────
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferred = e;
      clearTimeout(redirectTmr);
      if (autoA2HS) {
        showInstallBtn();
      } else {
        goToProd();
      }
    });

    window.addEventListener('appinstalled', () => {
      setStatus('✅ NightFly aggiunta alla Home!');
      document.getElementById('installBtn').style.display = 'none';
      document.getElementById('spinner').style.display = 'none';
      // Piccola pausa per far vedere il messaggio, poi redirect
      goToProd(2500);
    });

    // ── Install button ───────────────────────────────────────────────────────
    document.getElementById('installBtn').addEventListener('click', () => {
      const evt = deferred;
      deferred = null;
      if (!evt) { goToProd(); return; }
      document.getElementById('installBtn').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';
      setStatus('Installazione in corso…');
      evt.prompt();
      evt.userChoice.then((res) => {
        if (res.outcome === 'accepted') {
          // appinstalled gestirà il redirect
          setStatus('✅ Fatto! NightFly è sulla Home.');
          goToProd(3000);
        } else {
          // Utente ha annullato: torna al player
          goToProd(500);
        }
      }).catch(() => goToProd(500));
    });

    // ── Startup ──────────────────────────────────────────────────────────────
    if (!autoA2HS) {
      setStatus('Connessione in corso…');
      goToProd();
    } else {
      setStatus('In attesa di Chrome…');
      // Se beforeinstallprompt non arriva entro 8s (primo accesso), redirect
      redirectTmr = setTimeout(() => {
        setStatus('Riprova tra qualche secondo…');
        goToProd(1500);
      }, 8000);
    }
  </script>
</body>
</html>
